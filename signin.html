<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In v2 | Studio Leish</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --surface: #0f0f1a;
            --text: #eaeaea;
            --text-muted: #8892b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .logo { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 30px; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: var(--text); text-decoration: none; }
        .signin-container { background: var(--secondary); border-radius: 16px; padding: 40px; text-align: center; }
        h2 { margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 14px; background: var(--primary); border: 2px solid #2a2a4a; border-radius: 8px; color: var(--text); font-size: 1rem; text-align: center; }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .btn, .btn-signin { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #ff6b6b); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        .btn:hover, .btn-signin:hover { opacity: 0.9; }
        .btn-social { width: 100%; padding: 14px; background: white; color: #333; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-social:hover { background: #f5f5f5; }
        .divider { margin: 25px 0; color: var(--text-muted); }
        .toggle-link { color: var(--text-muted); font-size: 14px; }
        .toggle-link a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <div class="logo">Studio Leish</div>
        <div class="signin-container">
            <h2>Sign In</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Choose how you'd like to sign in</p>
            
            <button class="btn-social" onclick="_signInWithGoogle()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            
            <div class="divider">or</div>
            
            <form id="signinForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <button type="submit" class="btn-signin">Send Login Link</button>
            </form>
            
            <p class="toggle-link">No account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=20240504"></script>
    <script>
        // Using unique var name to avoid conflicts
        const _supabaseUrl = 'https://kcmoibrqyrzueslaqtgc.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjbW9pYnJxeXJ6dWVzbGFxdGdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTgyMjMsImV4cCI6MjA5MTM5NDIyM30.lKNoieYYCIU-cuHQk4W7dQvSqZdLfmb4I4QxfhNHuQk';
        
        const _supabaseLib = window.Supabase || window.supabase;
        const _supabase = _supabaseLib ? _supabaseLib.createClient(_supabaseUrl, _supabaseKey) : null;

        function _signInWithGoogle() {
            window.location.href = '/api/google-oauth';
        }

        if (_supabase) {
            document.getElementById('signinForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const btn = this.querySelector('button[type="submit"]');

                if (!email) return alert('Please enter your email');
                
                btn.disabled = true;
                btn.textContent = 'Sending...';

                const { error } = await _supabase.auth.signInWithOtp({
                    email,
                    options: { emailRedirectTo: 'https://studio.leish.my' }
                });

                if (error) {
                    alert(error.message);
                } else {
                    alert('Check your email for the login link!');
                }
                btn.disabled = false;
                btn.textContent = 'Send Login Link';
            });
        }
    </script>
</body>
</html>
