name: empire-elites
version: 1.0.0
metadata:
  template: azd-hello-world
services:
  app:
    project: .
    language: python
    host: containerapps
    docker:
      path: Dockerfile
    output: build
    resource:
      name: empire-elites
      location: eastus
    environmentVariables:
      - name: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}