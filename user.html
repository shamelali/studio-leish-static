<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | Studio Leish</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --surface: #0f0f1a;
            --text: #eaeaea;
            --text-muted: #8892b0;
            --border: #2a2a4a;
        }
 
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
 
        .container { width: 100%; max-width: 400px; padding: 20px; }
 
        .logo {
            text-align: center; font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px; cursor: pointer;
        }
 
        .form-container {
            background: var(--secondary); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px;
        }
 
        h2 { text-align: center; margin-bottom: 30px; font-size: 1.5rem; }
 
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 16px; background: var(--primary);
            border: 2px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
 
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #ff6b6b);
            color: white; border: none; border-radius: 8px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
 
        .toggle-link { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px; }
        .toggle-link a { color: var(--accent); cursor: pointer; text-decoration: underline; }
 
        .error { color: var(--accent); font-size: 14px; margin-top: 10px; text-align: center; }
        .success { color: #00d9a5; font-size: 14px; margin-top: 10px; text-align: center; }
 
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo" id="logo">Studio Leish</div>
 
        <!-- Login Form -->
        <div class="form-container" id="login-form">
            <h2>Sign In</h2>
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn" id="login-btn">Sign In</button>
            <div id="login-error" class="error"></div>
 
            <div style="text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 14px;">
                ──── OR ────
            </div>
 
            <button class="btn" id="google-btn" style="background: white; color: #333; border: 2px solid #ddd; display:flex; align-items:center; justify-content:center; gap:8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
 
            <div class="toggle-link">
                Don't have an account? <a id="show-register">Register</a>
            </div>
        </div>
 
        <!-- Register Form -->
        <div class="form-container hidden" id="register-form">
            <h2>Create Account</h2>
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Minimum 6 characters" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="reg-phone">Phone (Optional)</label>
                <input type="tel" id="reg-phone" placeholder="+60 12-345 6789" autocomplete="tel">
            </div>
            <button class="btn" id="register-btn">Create Account</button>
            <div id="reg-error" class="error"></div>
            <div id="reg-success" class="success"></div>
            <div class="toggle-link">
                Already have an account? <a id="show-login">Sign In</a>
            </div>
        </div>
    </div>
 
    <!-- Supabase loaded at END of body — guarantees it's ready before JS runs -->
<script src="https://cdn.jsdelivr.net/npm/@_supabase/_supabase-js@2?v=20240504"></script>
    <script>
        const __supabaseUrl = 'https://kcmoibrqyrzueslaqtgc._supabase.co';
        const __supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjbW9pYnJxeXJ6dWVzbGFxdGdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTgyMjMsImV4cCI6MjA5MTM5NDIyM30.lKNoieYYCIU-cuHQk4W7dQvSqZdLfmb4I4QxfhNHuQk';
        
        const __supabaseLib = window.Supabase || window._supabase;
        const __supabase = __supabaseLib ? __supabaseLib.createClient(__supabaseUrl, __supabaseKey) : null;
 
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || 'user-dashboard.html';
 
        function goToDashboard() {
            sessionStorage.setItem('authCompleted', 'true');
            window.location.href = redirectUrl + (redirectUrl.includes('?') ? '&' : '?') + 'restored=true';
        }
 
        // Check if already logged in
        (async function() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) goToDashboard();
            if (urlParams.get('error') === 'auth_failed') {
                document.getElementById('login-error').textContent = 'Authentication failed. Please try again.';
            }
        })();
 
        // Toggle forms
        document.getElementById('show-register').addEventListener('click', function() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        });
 
        document.getElementById('show-login').addEventListener('click', function() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        });
 
        document.getElementById('logo').addEventListener('click', function() {
            window.location.href = 'index.html';
        });
 
        // Login
        document.getElementById('login-btn').addEventListener('click', async function() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
 
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                return;
            }
 
            this.disabled = true;
            this.textContent = 'Signing in…';
            errorDiv.textContent = '';
 
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
 
            this.disabled = false;
            this.textContent = 'Sign In';
 
            if (error) { errorDiv.textContent = error.message; return; }
            goToDashboard();
        });
 
        // Register
        document.getElementById('register-btn').addEventListener('click', async function() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const phone = document.getElementById('reg-phone').value.trim();
            const errorDiv = document.getElementById('reg-error');
            const successDiv = document.getElementById('reg-success');
 
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all required fields';
                return;
            }
 
            this.disabled = true;
            this.textContent = 'Creating account…';
            errorDiv.textContent = '';
            successDiv.textContent = '';
 
            const { error } = await _supabase.auth.signUp({
                email, password,
                options: { data: { name, phone } }
            });
 
            this.disabled = false;
            this.textContent = 'Create Account';
 
            if (error) { errorDiv.textContent = error.message; return; }
 
            successDiv.textContent = 'Registration successful! Please check your email to verify.';
            setTimeout(() => {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
            }, 3000);
        });
 
// Google OAuth - redirect to our custom OAuth API
        document.getElementById('google-btn').addEventListener('click', function() {
            window.location.href = '/api/google-oauth?redirect=' + encodeURIComponent(redirectUrl);
        });
  
        // Enter key shortcuts
        document.getElementById('login-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });
        document.getElementById('reg-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('register-btn').click();
        });
    </script>
</body>
</html>
