<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | Studio Leish</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --surface: #0f0f1a;
            --text: #eaeaea;
            --text-muted: #8892b0;
            --border: #2a2a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .container { width: 100%; max-width: 400px; padding: 20px; }

        .logo {
            text-align: center; font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px; cursor: pointer;
        }

        .form-container {
            background: var(--secondary); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px;
        }

        h2 { text-align: center; margin-bottom: 30px; font-size: 1.5rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 16px; background: var(--primary);
            border: 2px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }

        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #ff6b6b);
            color: white; border: none; border-radius: 8px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }

        .toggle-link { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px; }
        .toggle-link a { color: var(--accent); cursor: pointer; text-decoration: underline; }

        .error { color: var(--accent); font-size: 14px; margin-top: 10px; text-align: center; }
        .success { color: #00d9a5; font-size: 14px; margin-top: 10px; text-align: center; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo" onclick="window.location.href='index.html'">Studio Leish</div>

        <!-- Login Form -->
        <div class="form-container" id="login-form">
            <h2>Sign In</h2>
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="login()">Sign In</button>
            <div id="login-error" class="error"></div>
            
            <div style="text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 14px;">
                ──── OR ────
            </div>
            
            <button class="btn" onclick="signInWithGoogle()" style="background: white; color: #333; border: 2px solid #ddd;">
                <i class="fab fa-google" style="margin-right: 8px;"></i> Sign in with Google
            </button>
            
            <div class="toggle-link">
                Don't have an account? <a onclick="showRegister()">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div class="form-container hidden" id="register-form">
            <h2>Create Account</h2>
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label for="reg-phone">Phone (Optional)</label>
                <input type="tel" id="reg-phone" placeholder="+60 12-345 6789">
            </div>
            <button class="btn" onclick="register()">Create Account</button>
            <div id="reg-error" class="error"></div>
            <div id="reg-success" class="success"></div>
            <div class="toggle-link">
                Already have an account? <a onclick="showLogin()">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://vnpiekiedynvechawhhw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZucGlla2llZHludmVjaGF3aGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjQ2MzUsImV4cCI6MjA5MDY0MDYzNX0.TsnM45hNEg8m2J0PdMUG43l-jnYbQ7VoyHUqdzdfJyY';
        const supabase = window.Supabase.createClient(supabaseUrl, supabaseKey);

        // Check if already logged in
        (async function() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'user-dashboard.html';
            }
        })();

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorDiv.textContent = error.message;
                return;
            }

            window.location.href = 'user-dashboard.html';
        }

        async function register() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const phone = document.getElementById('reg-phone').value;
            const errorDiv = document.getElementById('reg-error');
            const successDiv = document.getElementById('reg-success');

            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all required fields';
                return;
            }

            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    data: { name, phone }
                }
            });

            if (error) {
                errorDiv.textContent = error.message;
                return;
            }

            successDiv.textContent = 'Registration successful! Please check your email to verify.';
            setTimeout(() => showLogin(), 3000);
        }
    </script>
</body>
</html>
