<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Studio Leish</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --surface: #0f0f1a;
            --text: #eaeaea;
            --text-muted: #8892b0;
            --border: #2a2a4a;
            --success: #00d9a5;
            --warning: #f4d03f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px;
        }

        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .logout-btn {
            padding: 8px 16px; background: var(--secondary); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; cursor: pointer; font-size: 14px;
        }

        /* Login Form */
        .login-container {
            max-width: 400px; margin: 100px auto; background: var(--secondary);
            border: 1px solid var(--border); border-radius: 16px; padding: 40px;
        }

        .login-container h2 { text-align: center; margin-bottom: 30px; font-size: 1.5rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 16px; background: var(--primary); border: 2px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }

        .btn {
            width: 100%; padding: 12px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }

        .error { color: var(--accent); font-size: 14px; margin-top: 10px; text-align: center; }

        /* Dashboard */
        .dashboard { display: none; }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
        }
        .stat-card h3 { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-card p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        /* Controls (Search + Filter) */
        .controls {
            display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; align-items: flex-end;
        }
        .search-box {
            flex: 1; min-width: 250px; padding: 10px 16px; background: var(--primary);
            border: 2px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px;
        }
        .search-box:focus { outline: none; border-color: var(--accent); }
        .filter-select {
            padding: 10px 16px; background: var(--primary); border: 2px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px; cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: var(--accent); }

        /* Table */
        .bookings-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .bookings-table th {
            text-align: left; padding: 12px; background: var(--primary); color: var(--text-muted);
            font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
        }
        .bookings-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .status.pending { background: rgba(244, 208, 63, 0.2); color: var(--warning); }
        .status.confirmed { background: rgba(0, 217, 165, 0.2); color: var(--success); }
        .status.cancelled { background: rgba(233, 69, 96, 0.2); color: var(--accent); }

        .edit-btn {
            padding: 4px 10px; background: var(--primary); color: var(--accent);
            border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px;
            transition: all 0.3s;
        }
        .edit-btn:hover { background: var(--accent); color: white; }

        .loading { text-align: center; padding: 40px; color: var(--text-muted); }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: none; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--secondary); border: 1px solid var(--border);
            border-radius: 16px; width: 90%; max-width: 800px; max-height: 90vh;
            overflow-y: auto; padding: 30px;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border);
        }
        .modal-header h2 { font-size: 1.5rem; }
        .close-btn {
            background: none; border: none; color: var(--text-muted); font-size: 1.5rem;
            cursor: pointer; transition: color 0.3s;
        }
        .close-btn:hover { color: var(--text); }

        .modal-body { margin-bottom: 25px; }
        .two-col {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;
        }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

        .modal-footer {
            display: flex; justify-content: flex-end; gap: 12px; padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .btn-danger {
            padding: 10px 20px; background: var(--accent); color: white; border: none;
            border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;
        }
        .btn-secondary {
            padding: 10px 20px; background: var(--primary); color: var(--text);
            border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        .btn-primary {
            padding: 10px 20px; background: var(--accent); color: white; border: none;
            border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;
        }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
        .empty-state i { font-size: 3rem; margin-bottom: 20px; }
        .empty-state h3 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text); }
        .empty-state p { font-size: 1rem; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="login-form" class="login-container">
            <h2>Admin Login</h2>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="admin@leish.my">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="login()">Sign In</button>
            <div id="login-error" class="error"></div>
        </div>

        <!-- Dashboard (hidden until login) -->
        <div id="dashboard" class="dashboard">
            <div class="header">
                <div class="logo">Leish Studio Admin</div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>

            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <h3 id="total-bookings">0</h3>
                    <p>Total Bookings</p>
                </div>
                <div class="stat-card">
                    <h3 id="pending-bookings">0</h3>
                    <p>Pending</p>
                </div>
                <div class="stat-card">
                    <h3 id="confirmed-bookings">0</h3>
                    <p>Confirmed</p>
                </div>
                <div class="stat-card">
                    <h3 id="total-revenue">MYR 0</h3>
                    <p>Total Revenue</p>
                </div>
            </div>

            <h3 style="margin-bottom: 20px;">Booking Management</h3>

            <!-- Search & Filter Controls -->
            <div class="controls">
                <input type="text" class="search-box" id="search-input" placeholder="Search by client name, email, or booking ID..." onkeyup="filterBookings()">
                <select class="filter-select" id="status-filter" onchange="filterBookings()">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <select class="filter-select" id="payment-filter" onchange="filterBookings()">
                    <option value="">All Payments</option>
                    <option value="paid">Paid</option>
                    <option value="pending">Payment Pending</option>
                </select>
            </div>

            <div class="loading" id="loading">Loading bookings...</div>
            <div class="empty-state" id="empty-state">
                <i class="fas fa-calendar-times"></i>
                <h3>No bookings found</h3>
                <p>Try adjusting your search or filters.</p>
            </div>

            <table class="bookings-table" id="bookings-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Client</th>
                        <th>Email</th>
                        <th>Room</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Payment</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookings-tbody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Booking</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="two-col">
                    <div class="form-group">
                        <label>Booking ID</label>
                        <input type="text" id="edit-booking-id" disabled style="opacity: 0.6;">
                    </div>
                    <div class="form-group">
                        <label>Client Name</label>
                        <input type="text" id="edit-client-name">
                    </div>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="edit-client-email">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="edit-client-phone">
                    </div>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>Room</label>
                        <input type="text" id="edit-room">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="edit-date">
                    </div>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>Time</label>
                        <input type="text" id="edit-time" placeholder="e.g., 10:00 AM">
                    </div>
                    <div class="form-group">
                        <label>Session Type</label>
                        <input type="text" id="edit-session-type" placeholder="e.g., Single Session">
                    </div>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>Total Amount (MYR)</label>
                        <input type="number" id="edit-amount" min="0" step="1">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="edit-status" class="filter-select" style="width: 100%; padding: 10px; background: var(--primary); border: 2px solid var(--border); border-radius: 8px; color: var(--text);">
                            <option value="pending">Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="cancelled">Cancelled</option>
                            <option value="checked_in">Checked In</option>
                            <option value="checked_out">Checked Out</option>
                        </select>
                    </div>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>Payment Status</label>
                        <select id="edit-payment-status" class="filter-select" style="width: 100%; padding: 10px; background: var(--primary); border: 2px solid var(--border); border-radius: 8px; color: var(--text);">
                            <option value="pending">Pending</option>
                            <option value="paid">Paid</option>
                            <option value="failed">Failed</option>
                            <option value="refunded">Refunded</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Rating</label>
                        <input type="number" id="edit-rating" min="1" max="5" placeholder="1-5">
                    </div>
                </div>
                <div class="form-group">
                    <label>Add-ons (JSON)</label>
                    <textarea id="edit-addons" rows="2" style="width: 100%; padding: 10px; background: var(--primary); border: 2px solid var(--border); border-radius: 8px; color: var(--text); font-family: monospace; font-size: 13px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Review Comment</label>
                    <textarea id="edit-review-comment" rows="3" style="width: 100%; padding: 10px; background: var(--primary); border: 2px solid var(--border); border-radius: 8px; color: var(--text);"></textarea>
                </div>
                <div class="form-group">
                    <label>Internal Notes</label>
                    <textarea id="edit-notes" rows="3" style="width: 100%; padding: 10px; background: var(--primary); border: 2px solid var(--border); border-radius: 8px; color: var(--text);" placeholder="Admin notes (not visible to client)"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" onclick="deleteBooking()"><i class="fas fa-trash"></i> Delete</button>
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveChanges()"><i class="fas fa-save"></i> Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kcmoibrqyrzueslaqtgc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjbW9pYnJxeXJ6dWVzbGFxdGdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTgyMjMsImV4cCI6MjA5MTM5NDIyM30.lKNoieYYCIU-cuHQk4W7dQvSqZdLfmb4I4QxfhNHuQk';
        const supabase = window.Supabase.createClient(supabaseUrl, supabaseKey);

        let allBookings = []; // Store all bookings for filtering
        let currentBookingId = null;

        // Check if already logged in
        (async function() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) showDashboard();
        })();

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const loginBtn = document.querySelector('#login-form .btn');

            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                return;
            }

            // Show loading state
            loginBtn.textContent = 'Signing in...';
            loginBtn.disabled = true;
            errorDiv.textContent = '';

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                loginBtn.textContent = 'Sign In';
                loginBtn.disabled = false;
                errorDiv.textContent = error.message;
                console.error('Login error:', error);
                return;
            }

            console.log('Login successful:', data);
            errorDiv.style.color = 'var(--success)';
            errorDiv.textContent = 'Login successful! Redirecting...';

            showDashboard();
        }

        function logout() {
            supabase.auth.signOut();
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        function showDashboard() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadBookings();
        }

        async function loadBookings() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('bookings-table').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';

            const { data, error } = await supabase
                .from('bookings')
                .select('*')
                .order('createdAt', { ascending: false })
                .limit(100);

            if (error) {
                console.error('Error loading bookings:', error);
                return;
            }

            allBookings = data || [];
            document.getElementById('loading').style.display = 'none';

            if (allBookings.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
                return;
            }

            updateStats();
            filterBookings(); // Initial display with all bookings
        }

        function updateStats() {
            const total = allBookings.length;
            const pending = allBookings.filter(b => b.status === 'pending').length;
            const confirmed = allBookings.filter(b => b.status === 'confirmed').length;
            const revenue = allBookings
                .filter(b => b.paymentStatus === 'paid')
                .reduce((sum, b) => sum + (b.totalAmount || 0), 0);

            document.getElementById('total-bookings').textContent = total;
            document.getElementById('pending-bookings').textContent = pending;
            document.getElementById('confirmed-bookings').textContent = confirmed;
            document.getElementById('total-revenue').textContent = 'MYR ' + revenue;
        }

        function filterBookings() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            const paymentFilter = document.getElementById('payment-filter').value;

            let filtered = allBookings;

            // Apply search
            if (searchTerm) {
                filtered = filtered.filter(b =>
                    (b.booking_id && b.booking_id.toLowerCase().includes(searchTerm)) ||
                    (b.clientName && b.clientName.toLowerCase().includes(searchTerm)) ||
                    (b.clientEmail && b.clientEmail.toLowerCase().includes(searchTerm))
                );
            }

            // Apply status filter
            if (statusFilter) {
                filtered = filtered.filter(b => b.status === statusFilter);
            }

            // Apply payment filter
            if (paymentFilter) {
                filtered = filtered.filter(b => b.paymentStatus === paymentFilter);
            }

            displayBookings(filtered);
        }

        function displayBookings(bookings) {
            const tbody = document.getElementById('bookings-tbody');
            const table = document.getElementById('bookings-table');
            const emptyState = document.getElementById('empty-state');

            tbody.innerHTML = '';

            if (bookings.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            table.style.display = 'table';

            bookings.forEach(booking => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${booking.booking_id || '-'}</td>
                    <td>${booking.clientName || '-'}</td>
                    <td>${booking.clientEmail || '-'}</td>
                    <td>${booking.room || '-'}</td>
                    <td>${booking.date || '-'}</td>
                    <td>${booking.time || '-'}</td>
                    <td>MYR ${booking.totalAmount || 0}</td>
                    <td><span class="status ${booking.status}">${booking.status}</span></td>
                    <td><span class="status ${booking.paymentStatus === 'paid' ? 'confirmed' : 'pending'}">${booking.paymentStatus || 'pending'}</span></td>
                    <td>
                        <button class="edit-btn" onclick="openEditModal('${booking.booking_id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function openEditModal(bookingId) {
            currentBookingId = bookingId;
            const booking = allBookings.find(b => b.booking_id === bookingId);

            if (!booking) {
                alert('Booking not found');
                return;
            }

            // Populate modal fields
            document.getElementById('edit-booking-id').value = booking.booking_id || '';
            document.getElementById('edit-client-name').value = booking.clientName || '';
            document.getElementById('edit-client-email').value = booking.clientEmail || '';
            document.getElementById('edit-client-phone').value = booking.clientPhone || '';
            document.getElementById('edit-room').value = booking.room || '';
            document.getElementById('edit-date').value = booking.date || '';
            document.getElementById('edit-time').value = booking.time || '';
            document.getElementById('edit-session-type').value = booking.sessionType || '';
            document.getElementById('edit-amount').value = booking.totalAmount || 0;
            document.getElementById('edit-status').value = booking.status || 'pending';
            document.getElementById('edit-payment-status').value = booking.paymentStatus || 'pending';
            document.getElementById('edit-rating').value = booking.rating || '';
            document.getElementById('edit-addons').value = booking.addons ? JSON.stringify(booking.addons) : '';
            document.getElementById('edit-review-comment').value = booking.review_comment || '';
            document.getElementById('edit-notes').value = booking.adminNotes || '';

            // Show modal
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentBookingId = null;
        }

        async function saveChanges() {
            if (!currentBookingId) return;

            const updatedData = {
                clientName: document.getElementById('edit-client-name').value,
                clientEmail: document.getElementById('edit-client-email').value,
                clientPhone: document.getElementById('edit-client-phone').value,
                room: document.getElementById('edit-room').value,
                date: document.getElementById('edit-date').value,
                time: document.getElementById('edit-time').value,
                sessionType: document.getElementById('edit-session-type').value,
                totalAmount: parseInt(document.getElementById('edit-amount').value) || 0,
                status: document.getElementById('edit-status').value,
                paymentStatus: document.getElementById('edit-payment-status').value,
                rating: document.getElementById('edit-rating').value ? parseInt(document.getElementById('edit-rating').value) : null,
                review_comment: document.getElementById('edit-review-comment').value,
                adminNotes: document.getElementById('edit-notes').value
            };

            // Parse add-ons
            try {
                const addonsText = document.getElementById('edit-addons').value;
                if (addonsText.trim()) {
                    updatedData.addons = JSON.parse(addonsText);
                }
            } catch (e) {
                alert('Invalid JSON in Add-ons field');
                return;
            }

            const { error } = await supabase
                .from('bookings')
                .update(updatedData)
                .eq('booking_id', currentBookingId);

            if (error) {
                alert('Error saving changes: ' + error.message);
                return;
            }

            alert('Booking updated successfully!');
            closeModal();
            loadBookings(); // Reload
        }

        async function deleteBooking() {
            if (!currentBookingId) return;

            if (!confirm('Are you sure you want to DELETE this booking? This cannot be undone.')) {
                return;
            }

            const { error } = await supabase
                .from('bookings')
                .delete()
                .eq('booking_id', currentBookingId);

            if (error) {
                alert('Error deleting booking: ' + error.message);
                return;
            }

            alert('Booking deleted successfully!');
            closeModal();
            loadBookings(); // Reload
        }

        // Close modal on overlay click
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
