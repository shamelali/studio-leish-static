<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Studio Leish</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-card: #242424;
            --text-primary: #f5f5f5;
            --text-secondary: #aaa;
            --gold: #c9a96e;
            --gold-light: #e5d3a7;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
            color: var(--gold);
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .reviews-grid {
            display: grid;
            gap: 20px;
        }
        .review-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .reviewer-name {
            font-weight: 500;
            color: var(--gold-light);
        }
        .stars {
            color: var(--gold);
            font-size: 1.2rem;
        }
        .review-text {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .review-date {
            font-size: 0.85rem;
            color: #666;
            margin-top: 15px;
        }
        .rating-summary {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--bg-card);
            border-radius: 12px;
        }
        .rating-number {
            font-size: 4rem;
            font-weight: 600;
            color: var(--gold);
            font-family: 'Cormorant Garamond', serif;
        }
        .rating-stars {
            font-size: 2rem;
            color: var(--gold);
            margin: 10px 0;
        }
        .rating-count {
            color: var(--text-secondary);
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .nav a {
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Client Reviews</h1>
        <p class="subtitle">See what our clients say about their experience</p>
        
        <div class="rating-summary" id="ratingSummary">
            <div class="rating-number" id="avgRating">-</div>
            <div class="rating-stars" id="avgStars"></div>
            <div class="rating-count" id="totalReviews">Loading reviews...</div>
        </div>

        <div class="reviews-grid" id="reviewsGrid"></div>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="book.html">Book Now</a>
            <a href="user-dashboard.html">My Bookings</a>
        </nav>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://kcmoibrqyrzueslaqtgc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjbW9pYnJxeXJ6dWVzbGFxdGdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTgyMjMsImV4cCI6MjA5MTM5NDIyM30.lKNoieYYCIU-cuHQk4W7dQvSqZdLfmb4I4QxfhNHuQk';
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function loadReviews() {
            const { data: reviews, error } = await supabase
                .from('Review')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(50);

            if (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('reviewsGrid').innerHTML = '<p style="text-align:center;color:#666;">No reviews yet</p>';
                return;
            }

            const grid = document.getElementById('reviewsGrid');
            
            if (!reviews || reviews.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:#666;">No reviews yet. Be the first to review!</p>';
                return;
            }

            const avgRating = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;
            document.getElementById('avgRating').textContent = avgRating.toFixed(1);
            document.getElementById('avgStars').textContent = '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5 - Math.round(avgRating));
            document.getElementById('totalReviews').textContent = `${reviews.length} reviews`;

            grid.innerHTML = reviews.map(review => `
                <div class="review-card">
                    <div class="review-header">
                        <span class="reviewer-name">${review.client_email.split('@')[0]}</span>
                        <span class="stars">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</span>
                    </div>
                    <p class="review-text">${review.comment || 'No comment'}</p>
                    <div class="review-date">${new Date(review.created_at).toLocaleDateString('en-MY', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                </div>
            `).join('');
        }

        loadReviews();
    </script>
</body>
</html>
